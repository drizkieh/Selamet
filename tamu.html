<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Tamu — Devry & Titin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5E9C8;
    --ivory: #FAF6EE;
    --dark: #1A1410;
    --brown: #3D2B1F;
    --brown-mid: #6B4C38;
    --cream: #F0E8D5;
  }
  body {
    background: var(--dark);
    color: var(--ivory);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 60px 24px 40px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    position: relative;
  }
  .header::before {
    content: '';
    position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header-label {
    font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 6px;
    color: var(--gold); opacity: 0.7;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 300; color: var(--ivory);
    margin-bottom: 8px;
  }
  .header-sub {
    font-size: 13px; color: var(--gold);
    opacity: 0.6; letter-spacing: 2px;
  }

  /* ── STATS ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 900px; margin: 40px auto;
    padding: 0 24px;
  }
  .stat-card {
    border: 1px solid rgba(201,168,76,0.2);
    padding: 24px 16px;
    text-align: center;
    background: rgba(255,255,255,0.02);
    transition: border-color 0.3s;
  }
  .stat-card:hover { border-color: rgba(201,168,76,0.4); }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; font-weight: 300;
    color: var(--ivory); line-height: 1;
    margin-bottom: 8px;
  }
  .stat-num.gold { color: var(--gold); }
  .stat-num.green { color: #6BCB77; }
  .stat-num.red { color: #E07070; }
  .stat-num.amber { color: #E8C97A; }
  .stat-label {
    font-size: 10px; letter-spacing: 3px;
    color: var(--gold); opacity: 0.6;
    text-transform: uppercase;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    max-width: 900px; margin: 0 auto 24px;
    padding: 0 24px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .search-input {
    flex: 1; min-width: 200px;
    background: transparent;
    border: none; border-bottom: 1px solid rgba(201,168,76,0.3);
    color: var(--ivory); padding: 10px 0;
    font-family: 'Jost', sans-serif;
    font-size: 14px; font-weight: 300;
    outline: none;
    transition: border-color 0.3s;
  }
  .search-input::placeholder { color: rgba(250,246,238,0.3); }
  .search-input:focus { border-bottom-color: var(--gold); }
  .filter-btn {
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: var(--gold);
    padding: 8px 18px;
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.3s, border-color 0.3s;
  }
  .filter-btn:hover,
  .filter-btn.active { background: rgba(201,168,76,0.15); border-color: var(--gold); }

  /* ── TABLE ── */
  .table-wrap {
    max-width: 900px; margin: 0 auto;
    padding: 0 24px 80px;
    overflow-x: auto;
  }
  table {
    width: 100%; border-collapse: collapse;
  }
  thead tr {
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }
  thead th {
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 3px;
    color: var(--gold); opacity: 0.7;
    text-transform: uppercase;
    padding: 12px 16px; text-align: left;
    font-weight: 400;
  }
  tbody tr {
    border-bottom: 1px solid rgba(201,168,76,0.07);
    transition: background 0.2s;
  }
  tbody tr:hover { background: rgba(201,168,76,0.04); }
  tbody td {
    padding: 16px; font-size: 14px;
    color: var(--cream); opacity: 0.85;
    vertical-align: middle;
  }
  .td-name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 18px;
    color: var(--ivory) !important; opacity: 1 !important;
  }
  .td-time { font-size: 12px; opacity: 0.5 !important; }

  .badge {
    display: inline-block;
    padding: 4px 12px;
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; font-family: 'Cinzel', serif;
    border-radius: 2px;
  }
  .badge-hadir { background: rgba(107,203,119,0.15); color: #6BCB77; border: 1px solid rgba(107,203,119,0.3); }
  .badge-tidak { background: rgba(224,112,112,0.15); color: #E07070; border: 1px solid rgba(224,112,112,0.3); }
  .badge-mungkin { background: rgba(232,201,122,0.15); color: #E8C97A; border: 1px solid rgba(232,201,122,0.3); }

  .td-message {
    font-style: italic; font-size: 13px;
    max-width: 200px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
    opacity: 0.55 !important;
  }

  /* ── LOADING & EMPTY ── */
  .loading {
    text-align: center; padding: 80px 24px;
  }
  .loading-ring {
    width: 40px; height: 40px;
    border: 1px solid rgba(201,168,76,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 4px;
    color: var(--gold); opacity: 0.6;
    text-transform: uppercase;
  }
  .empty-state {
    text-align: center; padding: 60px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 20px;
    color: var(--cream); opacity: 0.4;
  }

  /* ── REFRESH BTN ── */
  .refresh-btn {
    position: fixed; bottom: 32px; right: 24px;
    width: 48px; height: 48px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    background: rgba(26,20,16,0.9);
    backdrop-filter: blur(8px);
    cursor: pointer; color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    transition: border-color 0.3s, transform 0.3s;
  }
  .refresh-btn:hover { border-color: var(--gold); transform: rotate(180deg); }

  /* ── BACK LINK ── */
  .back-link {
    position: fixed; top: 24px; left: 24px;
    font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 3px;
    color: var(--gold); opacity: 0.6;
    text-decoration: none; text-transform: uppercase;
    border: 1px solid rgba(201,168,76,0.3);
    padding: 8px 16px;
    transition: opacity 0.3s, border-color 0.3s;
    background: rgba(26,20,16,0.8);
    backdrop-filter: blur(8px);
  }
  .back-link:hover { opacity: 1; border-color: var(--gold); }

  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    thead th:nth-child(3),
    tbody td:nth-child(3),
    thead th:nth-child(6),
    tbody td:nth-child(6) { display: none; }
  }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Undangan</a>

<div class="header">
  <p class="header-label">Dashboard</p>
  <h1 class="header-title">Daftar Tamu</h1>
  <p class="header-sub">Devry & Titin · 27 September 2026</p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-num gold" id="stat-total">—</div>
    <div class="stat-label">Total Tamu</div>
  </div>
  <div class="stat-card">
    <div class="stat-num green" id="stat-hadir">—</div>
    <div class="stat-label">Hadir</div>
  </div>
  <div class="stat-card">
    <div class="stat-num red" id="stat-tidak">—</div>
    <div class="stat-label">Tidak Hadir</div>
  </div>
  <div class="stat-card">
    <div class="stat-num amber" id="stat-pax">—</div>
    <div class="stat-label">Total Pax</div>
  </div>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <input class="search-input" type="text" placeholder="Cari nama tamu..." id="search-input" oninput="filterTable()">
  <button class="filter-btn active" onclick="setFilter('semua', this)">Semua</button>
  <button class="filter-btn" onclick="setFilter('hadir', this)">Hadir</button>
  <button class="filter-btn" onclick="setFilter('tidak', this)">Tidak</button>
  <button class="filter-btn" onclick="setFilter('mungkin', this)">Mungkin</button>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <p class="loading-text">Memuat data tamu</p>
  </div>

  <table id="tamu-table" style="display:none;">
    <thead>
      <tr>
        <th>#</th>
        <th>Nama</th>
        <th>No HP</th>
        <th>Kehadiran</th>
        <th>Tamu</th>
        <th>Ucapan</th>
        <th>Waktu</th>
      </tr>
    </thead>
    <tbody id="tamu-body"></tbody>
  </table>

  <div class="empty-state" id="empty-state" style="display:none;">
    Belum ada tamu yang konfirmasi
  </div>
</div>

<button class="refresh-btn" onclick="loadData()" title="Refresh">↻</button>

<script>
// URL Apps Script — doGet harus support callback JSONP
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzA0omc5AuNevTiKSGHr6VL1-TMNfUjFyVq8iKaAEEMGgWgEFsp6wBp-EuEZpKoqaxi/exec';

let allData = [];
let currentFilter = 'semua';

function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('tamu-table').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  // Coba JSONP dulu
  tryJSONP();
}

function tryJSONP() {
  const old = document.getElementById('jsonp-script');
  if (old) old.remove();

  window._jsonpTimeout = setTimeout(() => {
    // Kalau JSONP timeout, coba fetch biasa
    tryFetch();
  }, 5000);

  window.handleData = function(json) {
    clearTimeout(window._jsonpTimeout);
    allData = json.data || [];
    renderTable();
    updateStats();
  };

  const script = document.createElement('script');
  script.id  = 'jsonp-script';
  script.onerror = () => { clearTimeout(window._jsonpTimeout); tryFetch(); };
  script.src = SCRIPT_URL + '?callback=handleData&t=' + Date.now();
  document.body.appendChild(script);
}

function tryFetch() {
  fetch(SCRIPT_URL + '?t=' + Date.now())
    .then(r => r.json())
    .then(json => {
      allData = json.data || [];
      renderTable();
      updateStats();
    })
    .catch(() => {
      document.getElementById('loading').innerHTML =
        '<p style="color:#E07070;font-family:Cinzel,serif;font-size:12px;letter-spacing:3px;text-align:center;">Gagal memuat data.<br><br><button onclick="loadData()" style="border:1px solid #C9A84C;background:transparent;color:#C9A84C;padding:8px 20px;font-family:Cinzel,serif;font-size:10px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;">Coba Lagi</button></p>';
    });
}

function updateStats() {
  const hadir  = allData.filter(d => d.attend === 'hadir').length;
  const tidak  = allData.filter(d => d.attend === 'tidak').length;
  const totalPax = allData.reduce((sum, d) => sum + (parseInt(d.guests) || 1), 0);

  document.getElementById('stat-total').textContent = allData.length;
  document.getElementById('stat-hadir').textContent = hadir;
  document.getElementById('stat-tidak').textContent = tidak;
  document.getElementById('stat-pax').textContent   = totalPax;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterTable();
}

function filterTable() {
  const keyword = document.getElementById('search-input').value.toLowerCase();
  const filtered = allData.filter(d => {
    const matchFilter =
      currentFilter === 'semua' ||
      d.attend === currentFilter;
    const matchSearch =
      !keyword ||
      d.nama.toLowerCase().includes(keyword) ||
      (d.message || '').toLowerCase().includes(keyword);
    return matchFilter && matchSearch;
  });
  renderRows(filtered);
}

function renderTable() {
  document.getElementById('loading').style.display = 'none';
  if (allData.length === 0) {
    document.getElementById('empty-state').style.display = 'block';
    return;
  }
  document.getElementById('tamu-table').style.display = 'table';
  filterTable();
}

function renderRows(data) {
  const tbody = document.getElementById('tamu-body');
  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;opacity:0.4;font-style:italic;font-family:'Cormorant Garamond',serif;font-size:18px;">Tidak ada data</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map((d, i) => {
    const badgeClass =
      d.attend === 'hadir'   ? 'badge-hadir'   :
      d.attend === 'tidak'   ? 'badge-tidak'   :
      d.attend === 'mungkin' ? 'badge-mungkin' : 'badge-mungkin';
    const attendLabel =
      d.attend === 'hadir'   ? 'Hadir'   :
      d.attend === 'tidak'   ? 'Tidak'   :
      d.attend === 'mungkin' ? 'Mungkin' : d.attend;
    return `
      <tr>
        <td style="opacity:0.3;font-size:12px;">${i + 1}</td>
        <td class="td-name">${d.nama || '-'}</td>
        <td>${d.phone || '-'}</td>
        <td><span class="badge ${badgeClass}">${attendLabel}</span></td>
        <td style="text-align:center;">${d.guests || 1}</td>
        <td class="td-message" title="${(d.message||'').replace(/"/g,"'")}">${d.message || '—'}</td>
        <td class="td-time">${d.waktu || '-'}</td>
      </tr>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
